# Nginx reverse-proxy snippet for WeTTY Terminal
#
# Optional — only needed if you want to expose WeTTY through DSM's built-in
# Nginx (Web Station / Login Portal > Reverse Proxy) rather than directly on
# port 13338.
#
# In DSM 7:  Control Panel → Login Portal → Advanced → Reverse Proxy
#   Source:   HTTPS  <your-nas-hostname>  /wetty  (or a custom hostname)
#   Dest:     HTTP   127.0.0.1            13338
#
# Alternatively, paste the block below into a custom Nginx config snippet
# if you manage Nginx manually.

location ^~ /wetty {
    proxy_pass         http://127.0.0.1:13338;
    proxy_http_version 1.1;

    # WebSocket upgrade — required for the terminal to work
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";

    proxy_read_timeout 43200000;

    proxy_set_header   Host              $http_host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-NginX-Proxy     true;
}
